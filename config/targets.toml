[defaults]
port = 22
user = "root"
secret_ref = "fleet_default"
# Idle-read timeout (seconds): a command silent this long marks the host FAILED and
# the fleet moves on. Heavy operations (install, package removal, service stop) get
# 2x this value. Override per target by setting command_timeout on its entry.
command_timeout = 60

